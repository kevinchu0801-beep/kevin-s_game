<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kevin's Game Hub - 游戏集合</title>
    <meta
      name="description"
      content="探索多种好玩的小游戏，挑战自我，享受快乐时光。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Kevin's Game Collection</p>
        <h1>🎮 游戏集合</h1>
        <p class="subtitle">探索精彩小游戏，挑战无限可能</p>
      </header>

      <section class="games-grid">
        <!-- 霓虹跑酷 -->
        <a href="games/neon-runner/index.html" class="game-card">
          <div class="card-icon">🏃‍♂️</div>
          <h2>霓虹街机跑酷</h2>
          <p>躲避障碍，收集金币，挑战最高分！</p>
          <div class="card-tags">
            <span class="tag">跑酷</span>
            <span class="tag">挑战</span>
          </div>
          <span class="play-btn">开始游戏 →</span>
        </a>

        <!-- 记忆配对 -->
        <a href="games/memory-match/index.html" class="game-card">
          <div class="card-icon">🧠</div>
          <h2>记忆卡片配对</h2>
          <p>翻转卡片，寻找相同的图案，考验你的记忆力！</p>
          <div class="card-tags">
            <span class="tag">记忆</span>
            <span class="tag">益智</span>
          </div>
          <span class="play-btn">开始游戏 →</span>
        </a>

        <!-- 推箱子 -->
        <a href="games/sokoban/index.html" class="game-card">
          <div class="card-icon">📦</div>
          <h2>推箱子</h2>
          <p>运用智慧，将箱子推到指定位置，挑战不同关卡！</p>
          <div class="card-tags">
            <span class="tag">益智</span>
            <span class="tag">策略</span>
          </div>
          <span class="play-btn">开始游戏 →</span>
        </a>
      </section>

      <footer class="footer">
        <p>© 2024 Kevin's Game Hub · 用 ❤️ 和代码构建</p>
      </footer>
    </main>
  </body>
</html>
