<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆卡片配对</title>
    <meta
      name="description"
      content="翻转几何卡片配对相同图案，挑战你的记忆力。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260607-4" />
    <script defer src="./main.js?v=20260607-4"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="shell">
      <a href="../../index.html" class="back-btn">返回首页</a>

      <header class="game-header">
        <div>
          <p class="eyebrow">Memory Match</p>
          <h1>记忆卡片配对</h1>
        </div>
        <div class="stats" aria-label="游戏状态">
          <div class="stat">
            <span>步数</span>
            <strong id="moves">0</strong>
          </div>
          <div class="stat">
            <span>配对</span>
            <strong id="pairs">0/8</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="timer">0:00</strong>
          </div>
        </div>
      </header>

      <section class="board-panel">
        <div class="board-toolbar">
          <p class="board-status" id="board-status">找到 8 组相同图形</p>
          <div class="controls">
            <button class="btn secondary" id="peek-btn" type="button">预览</button>
            <button class="btn secondary" id="restart-btn" type="button">重开</button>
            <button class="btn primary" id="new-game-btn" type="button">洗牌</button>
          </div>
        </div>

        <div class="game-board" id="game-board" aria-label="记忆卡片棋盘"></div>
      </section>

      <div class="overlay" id="win-screen">
        <div class="panel glass">
          <p class="panel-tag success">通关完成</p>
          <h2>全部图形已配对</h2>
          <p class="panel-copy">
            用了 <span id="final-moves">0</span> 步，用时
            <span id="final-time">0:00</span>。
          </p>
          <div class="panel-actions">
            <button class="primary" id="play-again-btn" type="button">再玩一次</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
