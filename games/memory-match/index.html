<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆卡片配对</title>
    <meta
      name="description"
      content="翻转卡片配对相同图案，挑战你的记忆力！"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./main.js"></script>
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="shell">
      <a href="../../index.html" class="back-btn">← 返回首页</a>

      <header class="game-header">
        <div>
          <p class="eyebrow">Memory Match</p>
          <h1>记忆卡片配对</h1>
        </div>
        <div class="stats">
          <div class="stat">
            <span>步数</span>
            <strong id="moves">0</strong>
          </div>
          <div class="stat">
            <span>配对</span>
            <strong id="pairs">0/8</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="timer">0:00</strong>
          </div>
        </div>
      </header>

      <section class="game-board" id="game-board">
        <!-- Cards will be generated by JavaScript -->
      </section>

      <section class="controls">
        <button class="btn primary" id="restart-btn">重新开始</button>
        <button class="btn secondary" id="new-game-btn">新游戏</button>
      </section>

      <div class="overlay overlay-visible" id="win-screen">
        <div class="panel glass">
          <p class="panel-tag success">🎉 恭喜通关！</p>
          <h2>你完成了配对！</h2>
          <p class="panel-copy">
            用了 <span id="final-moves">0</span> 步<br>
            用时 <span id="final-time">0:00</span>
          </p>
          <div class="panel-actions">
            <button class="primary" id="play-again-btn">再玩一次</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
