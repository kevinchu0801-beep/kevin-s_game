<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>霓虹街机跑酷</title>
    <meta
      name="description"
      content="一款轻量的网页小游戏：躲避障碍、收集金币、挑战最高分。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260607-6" />
    <script defer src="./main.js?v=20260607-6"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="shell">
      <a href="../../index.html" class="back-btn">返回首页</a>
      <section class="hud">
        <div>
          <p class="eyebrow">Neon Arcade Runner</p>
          <h1>霓虹街机跑酷</h1>
        </div>

        <div class="hud-actions">
          <div class="stats" aria-label="游戏状态">
            <div class="stat">
              <span>分数</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat">
              <span>最高分</span>
              <strong id="best-score">0</strong>
            </div>
            <div class="stat">
              <span>连击</span>
              <strong id="combo">x1</strong>
            </div>
          </div>
          <button class="control-btn" id="sound-button" type="button">音效：关</button>
          <button class="control-btn" id="pause-button" type="button" disabled>暂停</button>
        </div>
      </section>

      <section class="stage">
        <canvas id="game-canvas" aria-label="霓虹街机跑酷游戏画布"></canvas>

        <div class="overlay overlay-visible" id="start-screen">
          <div class="panel glass">
            <p class="panel-tag">Survival Run</p>
            <h2>闪避障碍，保持连击。</h2>
            <p class="panel-copy">
              键盘用 <code>A/D</code> 或方向键左右移动。手机上直接拖动角色。
              护盾能挡一次撞击，连续吃金币会提升连击分。
            </p>
            <div class="panel-actions">
              <button class="primary" id="start-button">开始游戏</button>
              <button class="secondary" id="mute-button" type="button">音效：关</button>
            </div>
          </div>
        </div>

        <div class="overlay" id="game-over-screen">
          <div class="panel glass">
            <p class="panel-tag danger">游戏结束</p>
            <h2>差一点，再来一局。</h2>
            <p class="panel-copy">
              你这局拿到了 <span id="final-score">0</span> 分，最高分是
              <span id="final-best">0</span> 分。
            </p>
            <div class="panel-actions">
              <button class="primary" id="restart-button">再来一局</button>
              <button class="secondary" id="back-button" type="button">返回说明</button>
            </div>
          </div>
        </div>

        <div class="mobile-tip glass">拖动角色移动，点击顶部暂停</div>
      </section>

      <section class="footer-hints glass" aria-label="操作提示">
        <div>键盘：A / D 或方向键</div>
        <div>目标：活得更久，维持连击</div>
      </section>
    </main>
  </body>
</html>
